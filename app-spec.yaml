name: water-quality-sentinel
region: nyc

databases:
  - name: db
    engine: PG
    production: true

services:
  - name: backend
    source_dir: /
    build_command: npm run build --prefix backend
    run_command: npm run start:prod --prefix backend
    http_port: 3001
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: JWT_ACCESS_SECRET
        scope: RUN_TIME
      - key: JWT_REFRESH_SECRET
        scope: RUN_TIME
      - key: API_KEY_SECRET
        scope: RUN_TIME
      - key: FRONTEND_URL
        scope: RUN_TIME
      - key: OPENROUTER_API_KEY
        scope: RUN_TIME
      - key: NASA_EARTHDATA_TOKEN
        scope: RUN_TIME
      - key: COPERNICUS_CLIENT_ID
        scope: RUN_TIME
      - key: COPERNICUS_CLIENT_SECRET
        scope: RUN_TIME
